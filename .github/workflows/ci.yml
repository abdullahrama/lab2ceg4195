name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/ceg4195-lab2

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Create stub UNet checkpoint
        # Generates a randomly initialised (untrained) model file so that
        # lab2.py can load at import time without a real trained checkpoint.
        run: |
          python - <<'EOF'
          import os, torch, segmentation_models_pytorch as smp
          os.makedirs("models", exist_ok=True)
          m = smp.Unet("resnet34", encoder_weights=None, in_channels=3, classes=1, activation=None)
          torch.save(m.state_dict(), "models/unet_resnet34.pth")
          print("Stub checkpoint saved to models/unet_resnet34.pth")
          EOF

      - name: Run pytest
        env:
          MODEL_PATH: models/unet_resnet34.pth
          SEG_THRESHOLD: "0.5"
          PORT: "5000"
        run: pytest tests/ -v --tb=short

  # ── Stage 2: Build Docker image ──────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build image (verify build, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Push to Docker Hub (main branch only) ───────────────────────────
  push:
    name: Push to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
